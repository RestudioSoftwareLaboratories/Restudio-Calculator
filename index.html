<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Restudio Calculator | JetBrains Mono</title>
    <link rel="icon" type="image/x-icon" href="https://i.postimg.cc/02cSd2QF/restudio-profile.png">
    <!-- math.js للتقييم الرياضي -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.2.1/math.min.js"></script>

    <!-- Google Material Icons (أيقونات نظيفة) -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- خط TINY5 من Google Fonts للشريط العلوي فقط -->
    <link href="https://fonts.googleapis.com/css2?family=Tiny5&display=swap" rel="stylesheet">

    <!-- JetBrains Mono font for calculator display and buttons -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* تجنب التحديد العرضي */
        }

        body {
            background: #f1f3f7;  /* خلفية هادئة فاتحة */
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 0;
        }

        /* ========== الشريط العلوي الأسود (مثل النسخة الأولى تماماً) ========== */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 1000;
            width: 100%;
            height: 64px;
            background: #000000; /* أسود خالص */
            border-bottom: 1px solid #222222; /* حد بسيط وثابت */
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 24px;
            gap: 14px;
        }

        /* حاوية الشعار - بنفس الحجم الأصلي (150px عرض، 58px ارتفاع) */
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            width: 150px;
            height: 58px;
            border-radius: 0;
            background: transparent;
            padding: 0;
            border: none;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* كلمة Calculator بخط TINY5 (نفس النسخة الأولى) */
        .brand-text {
            font-family: 'Tiny5', 'Courier New', monospace;
            font-size: 1.8rem;
            letter-spacing: 0.06em;
            color: #ffffff;
            line-height: 1;
        }

        /* ========== حاسبة مع خط JetBrains Mono ========== */
        .main-content {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 30px 16px 40px;
        }

        .calculator-wrapper {
            max-width: 460px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08), 0 2px 4px rgba(0, 0, 0, 0.02);
            padding: 1.5rem;
            transition: all 0.2s ease;
            border: 1px solid #eef2f5;
        }

        /* شاشة العرض - استخدام JetBrains Mono في كل النصوص الحسابية */
        .display-area {
            background: #f8fafd;
            border-radius: 20px;
            padding: 20px 18px;
            margin-bottom: 24px;
            border: 1px solid #e2e8f0;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.02);
        }

        .expression-line {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 0.85rem;
            font-weight: 500;
            color: #5b6e8c;
            text-align: left;
            direction: ltr;
            word-break: break-word;
            min-height: 24px;
            letter-spacing: -0.2px;
        }

        .result-line {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 2.4rem;
            font-weight: 600;
            color: #0f172a;
            text-align: right;
            word-break: break-word;
            line-height: 1.2;
            letter-spacing: -0.5px;
        }

        .result-line.error {
            color: #d32f2f;
            font-size: 1.5rem;
        }

        /* شبكة الأزرار - خط JetBrains Mono للأزرار الرقمية والعمليات */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            font-family: 'JetBrains Mono', 'Segoe UI', monospace;
            font-size: 1.2rem;
            font-weight: 500;
            padding: 14px 0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.12s linear;
            background: #f1f4f9;
            color: #1e2a3e;
            box-shadow: 0 1px 1px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        button:active {
            background: #e2e8f0;
            transform: scale(0.97);
        }

        .btn-number {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            color: #0f172a;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }
        .btn-number:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
        }

        .btn-operator {
            background: #eef2ff;
            color: #1e40af;
            font-weight: 700;
            border: 1px solid #cbdff2;
            font-family: 'JetBrains Mono', monospace;
        }
        .btn-operator:hover {
            background: #e0e7ff;
        }
        .btn-operator.active-op {
            background: #c7d9fe;
            color: #0c2d6b;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
        }

        .btn-equals {
            background: #1976d2;
            color: white;
            font-weight: 700;
            font-size: 1.5rem;
            border: none;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            font-family: 'JetBrains Mono', monospace;
        }
        .btn-equals:hover {
            background: #1565c0;
        }

        .btn-clear {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #ffcdd2;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
        }
        .btn-clear:hover {
            background: #fecaca;
        }

        .btn-func {
            background: #f1f5f9;
            color: #334155;
            border: 1px solid #e2e8f0;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }
        .btn-func:hover {
            background: #e6edf4;
        }

        .btn-zero {
            grid-column: span 2;
        }

        .material-icons {
            font-size: 1.3rem;
            font-family: 'Material Icons';
        }

        .footer-hint {
            text-align: center;
            font-size: 0.7rem;
            color: #8a99b0;
            margin-top: 20px;
            font-family: 'JetBrains Mono', monospace;
            border-top: 1px solid #ecf3f9;
            padding-top: 14px;
            letter-spacing: -0.2px;
        }

        /* استجابة للشاشات الصغيرة (مع الحفاظ على الشريط العلوي) */
        @media (max-width: 640px) {
            .top-bar {
                padding: 0 16px;
                height: 56px;
            }
            .logo-container {
                width: 110px;
                height: 48px;
            }
            .brand-text {
                font-size: 1.4rem;
            }
        }

        @media (max-width: 480px) {
            .calculator-wrapper {
                padding: 1rem;
            }
            .buttons-grid {
                gap: 8px;
            }
            button {
                padding: 12px 0;
                font-size: 1rem;
                border-radius: 18px;
            }
            .result-line {
                font-size: 1.9rem;
            }
            .logo-container {
                width: 90px;
                height: 44px;
            }
            .brand-text {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 360px) {
            button {
                font-size: 0.85rem;
                padding: 10px 0;
            }
            .btn-func {
                font-size: 0.8rem;
            }
            .result-line {
                font-size: 1.5rem;
            }
            .logo-container {
                width: 75px;
                height: 38px;
            }
            .brand-text {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<!-- الشريط العلوي الأسود (مطابق تمامًا للنسخة الأولى) -->
<header class="top-bar" role="banner" aria-label="شريط التطبيق العلوي">
    <div class="logo-container" title="swrh restudio logo">
        <img src="https://i.postimg.cc/90CzkZm3/swrh-restudio.png"
             alt="شعار swrh restudio"
             loading="eager"
             onerror="this.style.display='none'">
    </div>
    <span class="brand-text">Calculator</span>
</header>

<main class="main-content">
    <div class="calculator-wrapper">
        <!-- شاشة العرض - مع خط JetBrains -->
        <div class="display-area">
            <div class="expression-line" id="expressionLine">&nbsp;</div>
            <div class="result-line" id="resultLine">0</div>
        </div>

        <!-- شبكة الأزرار (بسيطة، مع أيقونات Google + خط JetBrains) -->
        <div class="buttons-grid">
            <!-- صف الدوال -->
            <button class="btn-func" data-action="func" data-value="sqrt(">√</button>
            <button class="btn-func" data-action="func" data-value="^">xʸ</button>
            <button class="btn-func" data-action="func" data-value="(">(</button>
            <button class="btn-func" data-action="func" data-value=")">)</button>

            <!-- صف المسح والحذف والنسبة -->
            <button class="btn-clear" data-action="clear" title="مسح الكل">AC</button>
            <button class="btn-clear" data-action="backspace" title="حذف">
                <span class="material-icons">backspace</span>
            </button>
            <button class="btn-func" data-action="func" data-value="%">%</button>
            <button class="btn-operator" data-action="operator" data-value="/">÷</button>

            <!-- أرقام + ضرب -->
            <button class="btn-number" data-action="number" data-value="7">7</button>
            <button class="btn-number" data-action="number" data-value="8">8</button>
            <button class="btn-number" data-action="number" data-value="9">9</button>
            <button class="btn-operator" data-action="operator" data-value="*">×</button>

            <button class="btn-number" data-action="number" data-value="4">4</button>
            <button class="btn-number" data-action="number" data-value="5">5</button>
            <button class="btn-number" data-action="number" data-value="6">6</button>
            <button class="btn-operator" data-action="operator" data-value="-">−</button>

            <button class="btn-number" data-action="number" data-value="1">1</button>
            <button class="btn-number" data-action="number" data-value="2">2</button>
            <button class="btn-number" data-action="number" data-value="3">3</button>
            <button class="btn-operator" data-action="operator" data-value="+">+</button>

            <!-- صفر، نقطة، يساوي -->
            <button class="btn-number btn-zero" data-action="number" data-value="0">0</button>
            <button class="btn-number" data-action="number" data-value=".">.</button>
            <button class="btn-equals" data-action="equals" title="يساوي">=</button>
        </div>

        <div class="footer-hint">
            Powered by math.js · © Restudio software laboratories
        </div>
    </div>
</main>

<script>
    (function() {
        // عناصر DOM
        const expressionLine = document.getElementById('expressionLine');
        const resultLine = document.getElementById('resultLine');
        const allButtons = document.querySelectorAll('button');

        // حالة الحاسبة
        let currentExpression = '';
        let justEvaluated = false;
        let lastResult = null;
        let activeOperatorBtn = null;

        function updateDisplay(expression, result, isError = false) {
            expressionLine.textContent = expression || '\u00A0';
            resultLine.textContent = (result !== null && result !== undefined) ? result : '0';
            resultLine.classList.remove('error');
            if (isError) resultLine.classList.add('error');
        }

        // معالجة النسبة المئوية بشكل متقدم قبل التقييم
        function preprocessPercent(expr) {
            // تحويل النسب المئوية مثل 50% إلى 0.5، لكن مع مراعاة العمليات: 50%+20% تعالج بحذر
            // نقوم باستبدال أي رقم عشري متبوع بـ % إلى (العدد/100)
            let processed = expr.replace(/(\d+(?:\.\d+)?)%/g, '($1/100)');
            // حالات خاصة مثل .5% أو (5+3)% يتم التعامل معها بشكل مباشر
            processed = processed.replace(/(\d+\.?\d*)%/g, '($1/100)');
            return processed;
        }

        function evaluateExpression(expr) {
            if (!expr || expr.trim() === '') return { result: '0', error: false };
            try {
                // معالجة علامة القسمة الظاهرة ÷ إلى /  و × إلى * للتأكد من التوافق
                let fixedExpr = expr.replace(/÷/g, '/').replace(/×/g, '*');
                // معالجة النسبة المئوية قبل التقييم
                fixedExpr = preprocessPercent(fixedExpr);
                
                const result = math.evaluate(fixedExpr);
                if (result === undefined || result === null || (typeof result === 'number' && !isFinite(result))) {
                    return { result: (typeof result === 'number' && !isFinite(result)) ? (result === Infinity ? '∞' : '-∞') : 'خطأ', error: true };
                }
                let formattedResult;
                if (typeof result === 'number') {
                    if (Number.isInteger(result)) formattedResult = result.toString();
                    else {
                        // التقريب الذكي ومنع الأرقام الطويلة جدًا
                        formattedResult = parseFloat(result.toPrecision(12)).toString();
                        if (Math.abs(result) > 1e14 || (Math.abs(result) < 1e-12 && result !== 0))
                            formattedResult = result.toExponential(8);
                        // إزالة اللواحق .0000001 الغير ضرورية
                        if (formattedResult.includes('.') && formattedResult.endsWith('0')) {
                            formattedResult = formattedResult.replace(/\.?0+$/, '');
                        }
                    }
                } else formattedResult = result.toString();
                return { result: formattedResult, error: false, rawResult: result };
            } catch (err) {
                // محاولة تصحيح بسيط: محاولة تقييم كتعبير جبري مع math.js مرة أخرى لو كان هناك خطأ في النسبة
                try {
                    let fallbackExpr = expr.replace(/÷/g, '/').replace(/×/g, '*');
                    // تجربة إزالة الأقواس غير المغلقة إذا كان الخطأ بسبب بناء الجملة
                    const fallbackResult = math.evaluate(fallbackExpr);
                    let formattedRes = fallbackResult.toString();
                    if (typeof fallbackResult === 'number') {
                        if (Number.isInteger(fallbackResult)) formattedRes = fallbackResult.toString();
                        else formattedRes = parseFloat(fallbackResult.toPrecision(12)).toString();
                    }
                    return { result: formattedRes, error: false, rawResult: fallbackResult };
                } catch (fallbackErr) {
                    return { result: 'خطأ', error: true };
                }
            }
        }

        function updateLiveResult() {
            if (!currentExpression || currentExpression.trim() === '') {
                updateDisplay(currentExpression, '0');
                return;
            }
            const { result, error } = evaluateExpression(currentExpression);
            updateDisplay(currentExpression, result, error);
        }

        function clearActiveOperator() {
            if (activeOperatorBtn) {
                activeOperatorBtn.classList.remove('active-op');
                activeOperatorBtn = null;
            }
        }

        function handleNumber(value) {
            if (justEvaluated) {
                currentExpression = value;
                justEvaluated = false;
                lastResult = null;
                clearActiveOperator();
            } else {
                if (value === '0' && (currentExpression === '' || currentExpression === '0')) {
                    if (currentExpression === '0') return;
                }
                if (value === '.') {
                    // تجنب تكرار النقطة في الرقم الحالي
                    const lastNumberMatch = currentExpression.match(/([\d.]+)$/);
                    if (lastNumberMatch && lastNumberMatch[1].includes('.')) return;
                    if (currentExpression === '' || currentExpression === '0') {
                        currentExpression = '0.';
                        justEvaluated = false;
                        updateLiveResult();
                        return;
                    }
                }
                if (currentExpression === '0' && value !== '.') currentExpression = value;
                else currentExpression += value;
            }
            clearActiveOperator();
            updateLiveResult();
        }

        function handleOperator(value, btnElement) {
            if (justEvaluated && lastResult !== null) {
                currentExpression = lastResult.toString() + value;
                justEvaluated = false;
                lastResult = null;
            } else if (currentExpression === '' || currentExpression === '0') {
                if (value === '-') currentExpression = '-';
                else return;
            } else {
                const lastChar = currentExpression.slice(-1);
                const operators = ['+', '-', '*', '/', '^', '%'];
                if (operators.includes(lastChar) && value !== '-') {
                    currentExpression = currentExpression.slice(0, -1) + value;
                } else if (lastChar === '-' && operators.includes(currentExpression.slice(-2, -1)) && value !== '-') {
                    currentExpression = currentExpression.slice(0, -2) + value;
                } else if (lastChar === '(' && value !== '-' && value !== '+') {
                    return;
                } else {
                    currentExpression += value;
                }
            }
            clearActiveOperator();
            if (btnElement && btnElement.classList.contains('btn-operator')) {
                btnElement.classList.add('active-op');
                activeOperatorBtn = btnElement;
            }
            justEvaluated = false;
            updateLiveResult();
        }

        function handleFunc(value) {
            if (justEvaluated && lastResult !== null) {
                if (value === '(' || value === 'sqrt(' || value === '^') {
                    currentExpression = lastResult.toString() + (value === '^' ? '^' : (value === '(' ? '*' + value : value));
                } else {
                    currentExpression = lastResult.toString() + value;
                }
                justEvaluated = false;
                lastResult = null;
            } else {
                if (currentExpression === '' || currentExpression === '0') {
                    if (value === 'sqrt(' || value === '(') currentExpression = value;
                    else if (value === '^') currentExpression = '0^';
                    else if (value === '%') currentExpression = '0%';
                    else currentExpression += value;
                } else {
                    // إذا أضفنا ^ أو sqrt نتعامل معها مباشرة
                    if (value === 'sqrt(' && /[\d\)]$/.test(currentExpression)) {
                        currentExpression += '*sqrt(';
                    } else {
                        currentExpression += value;
                    }
                }
            }
            clearActiveOperator();
            updateLiveResult();
        }

        function handleClear() {
            currentExpression = '';
            justEvaluated = false;
            lastResult = null;
            clearActiveOperator();
            updateDisplay('', '0');
        }

        function handleBackspace() {
            if (justEvaluated) {
                handleClear();
                return;
            }
            if (currentExpression.length > 0) {
                const funcPatterns = ['sqrt('];
                let removed = false;
                for (const pattern of funcPatterns) {
                    if (currentExpression.endsWith(pattern)) {
                        currentExpression = currentExpression.slice(0, -pattern.length);
                        removed = true;
                        break;
                    }
                }
                if (!removed) currentExpression = currentExpression.slice(0, -1);
            }
            clearActiveOperator();
            updateLiveResult();
        }

        function handleEquals() {
            if (!currentExpression || currentExpression.trim() === '') {
                updateDisplay('', '0');
                return;
            }
            const { result, error, rawResult } = evaluateExpression(currentExpression);
            if (!error && rawResult !== undefined && rawResult !== null) {
                lastResult = rawResult;
                updateDisplay(currentExpression + ' =', result, false);
                currentExpression = rawResult.toString();
            } else {
                updateDisplay(currentExpression + ' =', result, true);
                currentExpression = '';
            }
            justEvaluated = true;
            clearActiveOperator();
        }

        function handleButtonClick(event) {
            const btn = event.currentTarget;
            const action = btn.dataset.action;
            const value = btn.dataset.value;
            btn.style.transform = 'scale(0.96)';
            setTimeout(() => { btn.style.transform = ''; }, 100);
            switch(action) {
                case 'number': handleNumber(value); break;
                case 'operator': handleOperator(value, btn); break;
                case 'func': handleFunc(value); break;
                case 'clear': handleClear(); break;
                case 'backspace': handleBackspace(); break;
                case 'equals': handleEquals(); break;
                default: break;
            }
        }

        function handleKeyDown(event) {
            const key = event.key;
            let targetBtn = null;
            const preventKeys = ['Enter', 'Backspace', 'Delete', '/', '*', '-', '+', '=', '^', '%', '(', ')', '.'];
            if (preventKeys.includes(key)) event.preventDefault();
            switch(key) {
                case '0': case '1': case '2': case '3': case '4': case '5': case '6': case '7': case '8': case '9':
                    handleNumber(key);
                    targetBtn = document.querySelector(`[data-action="number"][data-value="${key}"]`);
                    break;
                case '.': handleNumber('.'); targetBtn = document.querySelector('[data-action="number"][data-value="."]'); break;
                case '+': handleOperator('+', document.querySelector('[data-action="operator"][data-value="+"]')); targetBtn = document.querySelector('[data-action="operator"][data-value="+"]'); break;
                case '-': handleOperator('-', document.querySelector('[data-action="operator"][data-value="-"]')); targetBtn = document.querySelector('[data-action="operator"][data-value="-"]'); break;
                case '*': handleOperator('*', document.querySelector('[data-action="operator"][data-value="*"]')); targetBtn = document.querySelector('[data-action="operator"][data-value="*"]'); break;
                case '/': handleOperator('/', document.querySelector('[data-action="operator"][data-value="/"]')); targetBtn = document.querySelector('[data-action="operator"][data-value="/"]'); break;
                case '%': handleFunc('%'); targetBtn = document.querySelector('[data-action="func"][data-value="%"]'); break;
                case '^': handleFunc('^'); targetBtn = document.querySelector('[data-action="func"][data-value="^"]'); break;
                case '(': handleFunc('('); targetBtn = document.querySelector('[data-action="func"][data-value="("]'); break;
                case ')': handleFunc(')'); targetBtn = document.querySelector('[data-action="func"][data-value=")"]'); break;
                case 'Enter': case '=': handleEquals(); targetBtn = document.querySelector('[data-action="equals"]'); break;
                case 'Backspace': handleBackspace(); targetBtn = document.querySelector('[data-action="backspace"]'); break;
                case 'Delete': handleClear(); targetBtn = document.querySelector('[data-action="clear"]'); break;
                case 'Escape': handleClear(); targetBtn = document.querySelector('[data-action="clear"]'); break;
                case 's': case 'S':
                    if (!event.ctrlKey && !event.metaKey) {
                        handleFunc('sqrt(');
                        targetBtn = document.querySelector('[data-action="func"][data-value="sqrt("]');
                    } break;
                default: return;
            }
            if (targetBtn) {
                targetBtn.style.transform = 'scale(0.94)';
                setTimeout(() => { if(targetBtn) targetBtn.style.transform = ''; }, 100);
            }
        }

        allButtons.forEach(btn => {
            btn.addEventListener('click', handleButtonClick);
            btn.addEventListener('mousedown', (e) => e.preventDefault());
        });
        document.addEventListener('keydown', handleKeyDown);
        updateDisplay('', '0');
    })();
</script>
</body>
</html>
